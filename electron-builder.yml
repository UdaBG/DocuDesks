appId: com.docudesk.app
productName: DocuDesk
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - dist-electron/**
  - package.json

asar: true

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

fileAssociations:
  - ext: pdf
    name: PDF Document
    description: PDF Document
    role: Viewer
